services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_image_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network

  redis:
    image: redis:7-alpine
    container_name: ai_image_redis
    restart: always
    networks:
      - ai_network

  app:
    build: .
    container_name: ai_image_app
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - ai_network

  frontend:
    build:
      context: ./frontend
    container_name: ai_image_frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - ai_network

  celery_worker:
    build: .
    container_name: ai_image_worker
    restart: always
    env_file: .env
    command: celery -A app.tasks.celery_app:celery_instance worker --loglevel=info
    depends_on:
      - redis
    networks:
      - ai_network

  nginx:
    image: nginx:latest
    container_name: ai_image_nginx
    restart: always
    ports:
      - "80:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge

volumes:
  postgres_data:
